name: rs_iron_example
description: Example Flutter application demonstrating rs_iron with BLoC pattern
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: any
  equatable: any
  auto_route: any
  rs_iron:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  build_runner: any
  auto_route_generator: any

flutter:
  uses-material-design: true
