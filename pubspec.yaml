name: rs_iron
description: A Spring-like dependency injection framework for Dart with code generation for Flutter compatibility.
version: 0.0.1
homepage: https://github.com/reezcode/rs_iron
repository: https://github.com/reezcode/rs_iron

environment:
  sdk: ^3.11.5

dependencies:
  # Core dependencies for dependency injection
  collection: ^1.19.1
  meta: ">=1.17.0 <2.0.0"
  # Code generation dependencies
  build: ^4.0.6
  source_gen: ^4.2.3
  analyzer: ">=10.0.0 <14.0.0"
  glob: ^2.1.3

dev_dependencies:
  lints: any
  test: any
  build_runner: any

# Dart analyzer configuration
analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
# This package provides Spring-like dependency injection for Dart
